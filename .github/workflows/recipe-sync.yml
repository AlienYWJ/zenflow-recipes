name: Recipe Sync on Approval

on:
  issues:
    types: [labeled]

jobs:
  sync-recipe:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse and Sync Recipe
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          script: |
            const fs = require('fs');
            const issueBody = process.env.ISSUE_BODY;
            if (!issueBody) {
              core.setFailed("Issue body is empty");
              return;
            }

            // Extract JSON block using regex
            let jsonText = "";
            const jsonMatch = issueBody.match(/```(?:json)?\s*([\s\S]+?)\s*```/);
            if (jsonMatch) {
              jsonText = jsonMatch[1].trim();
            } else {
              // Fallback: search for first '{' and last '}'
              const startIdx = issueBody.indexOf('{');
              const endIdx = issueBody.lastIndexOf('}');
              if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
                jsonText = issueBody.substring(startIdx, endIdx + 1);
              } else {
                jsonText = issueBody.trim();
              }
            }

            let newRecipes;
            try {
              newRecipes = JSON.parse(jsonText);
            } catch (err) {
              core.setFailed(`Failed to parse JSON from issue body: ${err.message}. Raw extracted text was: ${jsonText}`);
              return;
            }

            // Normalize recipe output to array
            if (!Array.isArray(newRecipes)) {
              newRecipes = [newRecipes];
            }

            // Read, parse, and update directory.json
            const dirPath = './directory.json';
            let directory = [];
            if (fs.existsSync(dirPath)) {
              try {
                directory = JSON.parse(fs.readFileSync(dirPath, 'utf8'));
              } catch (err) {
                core.warning(`Failed to parse existing directory.json: ${err.message}. Starting fresh.`);
                directory = [];
              }
            }
            if (!Array.isArray(directory)) {
              directory = [];
            }

            // Merge & Deduplicate by recipe.id (newer replaces older)
            const directoryMap = new Map(directory.map(r => [r.id, r]));
            let addedCount = 0;
            let updatedCount = 0;

            for (const recipe of newRecipes) {
              if (!recipe.id) {
                core.warning(`Skipping recipe lacking required 'id' field: ${JSON.stringify(recipe)}`);
                continue;
              }
              if (directoryMap.has(recipe.id)) {
                updatedCount++;
              } else {
                addedCount++;
              }
              directoryMap.set(recipe.id, recipe);
            }

            // Write updated directory back
            fs.writeFileSync(dirPath, JSON.stringify(Array.from(directoryMap.values()), null, 2), 'utf8');
            console.log(`Successfully merged recipes. Added: ${addedCount}, Updated: ${updatedCount}`);

            // Construct and post interactive feedback
            const commentBody = `🎉 **感谢您分享您的认知配方！**\n\n您的配方已被管理员审核通过，并通过 GitOps 自动合并至 \`directory.json\` 中。\n\n- 🆕 **新增配方**: ${addedCount} 个\n- 🔄 **更新配方**: ${updatedCount} 个\n\n该 Issue 已自动关闭。期待您未来提交更多精彩配方！`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add directory.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No modifications in directory.json to commit."
          else
            git commit -m "chore: auto-sync recipe from issue #${{ github.event.issue.number }}"
            git push
          fi
